name: ${COMMDEV_TESTBED_NAME:-commdev-comms-testbed}

x-board-service: &board-service
  build:
    context: .
    dockerfile: .devcontainer/Dockerfile
    target: comms-toolchain
  init: true
  stdin_open: true
  tty: true
  working_dir: /workspace
  entrypoint:
    - /bin/bash
    - /workspace/scripts/start-board.sh

x-board-common-env: &board-common-env
  COMM_LOG_LEVEL: ${COMM_LOG_LEVEL:-info}
  OPCUA_NAMESPACE: ${OPCUA_NAMESPACE:-urn:commdev:opcua}

services:
  board-a:
    <<: *board-service
    hostname: board-a
    environment:
      <<: *board-common-env
      COMM_ROLE: server
      COMM_INSTANCE_NAME: board-a
      COMM_PORT: 4840
      COMM_ENDPOINT: opc.tcp://${BOARD_A_IPV4_ADDRESS:-192.168.10.10}:4840
      COMM_PEER_ENDPOINT: opc.tcp://${BOARD_B_IPV4_ADDRESS:-192.168.10.11}:4840
    networks:
      commdev-comms:
        ipv4_address: ${BOARD_A_IPV4_ADDRESS:-192.168.10.10}

  board-b:
    <<: *board-service
    hostname: board-b
    environment:
      <<: *board-common-env
      COMM_ROLE: client
      COMM_INSTANCE_NAME: board-b
      COMM_PORT: 4840
      COMM_ENDPOINT: opc.tcp://${BOARD_B_IPV4_ADDRESS:-192.168.10.11}:4840
      COMM_PEER_ENDPOINT: opc.tcp://${BOARD_A_IPV4_ADDRESS:-192.168.10.10}:4840
    networks:
      commdev-comms:
        ipv4_address: ${BOARD_B_IPV4_ADDRESS:-192.168.10.11}

networks:
  commdev-comms:
    external: true
    name: ${COMMDEV_COMMS_NETWORK:-commdev-comms-net}
